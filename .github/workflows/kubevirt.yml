name: kubevirt plugin

on:
  push:
    paths:
      - 'kubevirt/**'
      - 'Dockerfile.plugins'
      - '.dockerignore'
      - '.github/workflows/kubevirt.yml'
      - 'justfile'
    tags:
      - 'kubevirt-*'
  pull_request:
    paths:
      - 'kubevirt/**'
      - 'Dockerfile.plugins'
      - '.dockerignore'
      - '.github/workflows/kubevirt.yml'
      - 'justfile'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PLUGIN_IMAGE: ghcr.io/${{ github.repository_owner }}/headlamp-plugin-kubevirt
    defaults:
      run:
        working-directory: kubevirt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: kubevirt/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npx headlamp-plugin lint

      - name: Type check
        run: npx headlamp-plugin tsc

      - name: Test
        run: npx headlamp-plugin test

      - name: Build
        run: npx headlamp-plugin build

      - name: Package
        run: npx headlamp-plugin package

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: kubevirt-plugin
          path: kubevirt/*.tar.gz
          if-no-files-found: error

      - name: Upload package to release
        if: startsWith(github.ref, 'refs/tags/kubevirt-')
        uses: softprops/action-gh-release@v2
        with:
          files: kubevirt/*.tar.gz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build plugin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.plugins
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.PLUGIN_IMAGE }}:latest
            ${{ env.PLUGIN_IMAGE }}:${{ github.sha }}
